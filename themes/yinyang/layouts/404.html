<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" class="dark">
{{ partial "head.html" . }}

<body>
  <article class="w-full px-2 mx-auto max-w-[800px]" id="main-container">
    {{ partial "header.html" . }}
    
    <div class="flex flex-col items-center justify-center min-h-[50vh] animate-fade-in-up text-center">
      <h1 class="text-9xl font-bold font-display text-neutral-200 dark:text-neutral-800 mb-4 select-none">404</h1>
      <h2 class="text-2xl font-bold text-neutral-900 dark:text-white mb-6">Page Not Found</h2>
      <p class="text-neutral-500 dark:text-neutral-400 mb-10 max-w-md">
        Oops! The page you're looking for seems to have wandered off into the digital void.
      </p>
      
      <a href="{{ "/" | relURL }}" class="group inline-flex items-center justify-center px-8 py-3 bg-black text-white rounded-full font-medium text-sm transition-all duration-300 hover:scale-105 hover:shadow-lg hover:shadow-neutral-500/30 active:scale-95 dark:bg-white dark:text-black dark:hover:shadow-white/20">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Home
      </a>
    </div>

    {{ partial "footer.html" . }}
  </article>

  {{ partial "scripts.html" . }}
</body>
</html>
