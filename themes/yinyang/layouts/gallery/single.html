<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" prefix="og: http://ogp.me/ns#">
{{ partial "head.html" . }}

<body>
  <article class="w-full px-2 mx-auto max-w-[800px] {{ .Site.Language.LanguageName }}" id="main-container">
    <div class="flex flex-wrap -mx-2">
      <div class="w-full px-2">
        <div class="site-header">
          {{ partial "header.html" . }}
        </div>
        <header class="mb-[50px] mt-10">
          <h1 class="text-2xl font-semibold m-0 max-sm:text-lg text-black/90 dark:text-white">{{ .Title }}</h1>
        </header>

        <div class="mb-[50px] prose max-w-full prose-headings:text-black/90 prose-p:text-black/80 prose-strong:text-black/90 prose-li:text-black/80 prose-a:underline prose-a:decoration-black/20 hover:prose-a:decoration-black/60 prose-blockquote:border-l-4 prose-blockquote:border-black/20 prose-blockquote:pl-4 prose-code:bg-black/5 prose-code:border prose-code:border-transparent prose-code:text-black/90 prose-code:rounded prose-code:px-1 prose-code:py-0.5 prose-code:before:content-none prose-code:after:content-none dark:prose-invert dark:prose-a:decoration-white dark:prose-blockquote:border-neutral-700 dark:prose-code:bg-neutral-800">
          <div class="flex flex-wrap -mx-2 gallery">
            {{ range .Params.gallery }}
            <div class="w-1/2 px-2 mb-5 text-center gallery-img">
              <img src="{{ .url }}" alt="{{ .name }}" class="max-w-full h-auto mx-auto rounded-lg shadow-sm shadow-black/5 dark:shadow-black/50 dark:shadow-sm">
              <span class="block text-xs text-black/60 mt-2 gallery-img-desc dark:text-neutral-500">{{ .name }}</span>
            </div>
            {{ end }}
          </div>
        </div>

        {{ partial "artalk.html" . }}

        {{ partial "footer.html" . }}
      </div>
    </div>
  </article>

  {{ partial "scripts.html" . }}
  {{ if .Site.Params.extraBody }}
  {{ .Site.Params.extraBody | safeHTML }}
  {{ end }}

</body>

</html>
