{{ if and .Site.Params.lazyImage (not .IsHome) -}}
<script src="{{ .Site.Params.staticPrefix }}{{ "js/lazyload.min.js" | relURL }}"></script>
<script>
  var lazyImage = new LazyLoad({
    container: document.getElementById('article')
  });
</script>
{{ end }}
<script src="https://unpkg.com/artalk@2/dist/Artalk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pjax@0.2.8/pjax.min.js"></script>

<script>
  // Helper: Toggle Dark Mode
  function toggleDarkMode() {
    if (document.documentElement.classList.contains('dark')) {
      document.documentElement.classList.remove('dark');
      localStorage.setItem('color-theme', 'light');
    } else {
      document.documentElement.classList.add('dark');
      localStorage.setItem('color-theme', 'dark');
    }
    if (window.artalk) {
      window.artalk.setDarkMode(document.documentElement.classList.contains('dark'));
    }
  }

  // Helper: Bind Toggle Button
  function bindDarkModeToggle() {
    const btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.removeEventListener('click', toggleDarkMode);
      btn.addEventListener('click', toggleDarkMode);
    }
  }

  // Helper: Init Artalk
  function initArtalk() {
    if (!document.getElementById('Comments')) return;
    // Destroy previous instance if exists to prevent memory leaks/duplicates
    if (window.artalk) {
      window.artalk.destroy();
    }
    window.artalk = Artalk.init({
      el:        '#Comments',
      pageKey:   window.location.pathname,
      pageTitle: document.title,
      server:    '{{ .Site.Params.artalk.server }}',
      site:      '{{ .Site.Params.artalk.site }}',
      darkMode:  document.documentElement.classList.contains('dark'),
    });
  }

  // Initialize State
  if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }

  // PJAX Setup
  var pjax = new Pjax({
    elements: "a[href]:not([target='_blank'])",
    selectors: ["title", "meta[name=description]", "#main-container"],
    cacheBust: false,
    analytics: false
  });

  document.addEventListener('pjax:complete', function() {
    bindDarkModeToggle();
    
    if (typeof LazyLoad !== 'undefined') {
       new LazyLoad({ container: document.getElementById('main-container') });
    }
    initArtalk();
  });

  // Initial Run
  document.addEventListener("DOMContentLoaded", function() {
    bindDarkModeToggle();
    initArtalk();
  });
</script>
