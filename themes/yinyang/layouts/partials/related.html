{{ $related := (where site.RegularPages "Type" "in" site.Params.mainSections).Related . | first 3 }}
{{ with $related }}
<div class="mt-20 border-t border-black/5 pt-10 dark:border-neutral-800">
  <div class="text-xs font-bold text-black/40 tracking-widest mb-8 flex items-center gap-2 dark:text-neutral-500">
    <span class="w-2 h-2 bg-black/80 rounded-full dark:bg-neutral-700"></span>
    RELATED POSTS
  </div>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {{ range . }}
    <a href="{{ .RelPermalink }}" class="group block p-6 bg-white/80 backdrop-blur-xl border border-black/5 rounded-2xl shadow-sm shadow-black/5 hover:shadow-xl hover:shadow-black/5 hover:-translate-y-2 transition-all duration-500 relative overflow-hidden hover:bg-white dark:bg-neutral-900/60 dark:border-white/5 dark:hover:bg-neutral-900/80 dark:hover:shadow-black/50 dark:shadow-sm">
      <h4 class="font-bold text-black/90 mb-3 group-hover:text-black line-clamp-2 dark:text-neutral-200 dark:group-hover:text-white">{{ .Title }}</h4>
      <div class="text-black/40 text-xs font-mono flex items-center gap-2 dark:text-neutral-500">
        <span class="w-1.5 h-1.5 rounded-full bg-black/80 group-hover:bg-black transition-colors dark:bg-neutral-600 dark:group-hover:bg-white"></span>
        {{ .Date.Format "2006.01.02" }}
      </div>
      
      <!-- Decorative gradient blob on hover -->
      <div class="absolute -bottom-10 -right-10 w-24 h-24 bg-gradient-to-br from-black/5 to-transparent rounded-full blur-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none dark:from-neutral-800 dark:to-neutral-700"></div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
