<article class="post-card">
  <a href="{{ .RelPermalink }}" class="card-link">
    {{ with .Params.cover }}
      <div class="card-cover">
        <img src="{{ . }}" alt="{{ .Title }}">
      </div>
    {{ end }}
    
    <div class="card-content">
      <h3 class="card-title">{{ .Title }}</h3>
      <p class="card-excerpt">{{ with .Description }}{{ . }}{{ else }}{{ .Summary | plainify | truncate 100 }}{{ end }}</p>
      <div class="card-meta">
        <span class="card-date">{{ .Date.Format "2006-01-02" }}</span>
        {{ with .Params.category }}
          <span class="card-category">{{ . }}</span>
        {{ end }}
      </div>
    </div>
  </a>
</article>
