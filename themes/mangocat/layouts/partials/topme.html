<div class="profile-header">
  <div class="profile-avatar-wrapper">
    <div class="profile-avatar">
      <img src="{{ if .Site.Params.profile.avatar }}{{ .Site.Params.profile.avatar }}{{ else }}/avatar.jpg{{ end }}" alt="{{ .Site.Params.author }}" />
    </div>
    <span class="online-status" title="在线"></span>
  </div>
  <p class="profile-name">@{{ .Site.Params.author }}</p>
</div>

<style>
  .profile-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px 15px 20px;
    margin: 0 0 8px;
  }

  .profile-avatar-wrapper {
    position: relative;
    display: inline-block;
  }

  .profile-avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    border: 5px solid var(--border-color);
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
  }

  .profile-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .online-status {
    position: absolute;
    bottom: 12px;
    right: 10px;
    width: 16px;
    height: 16px;
    background-color: #22c55e;
    border-radius: 50%;
    border: 2px solid var(--card-bg);
    box-shadow: 0 2px 6px rgba(34, 197, 94, 0.4);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% {
      box-shadow: 0 2px 8px rgba(34, 197, 94, 0.4);
    }
    50% {
      box-shadow: 0 2px 16px rgba(34, 197, 94, 0.7);
    }
  }

  .profile-name {
    margin-top: 16px;
    font-size: calc(var(--font-title-size) + 4px);
    font-weight: bold;
    color: var(--title-color);
    letter-spacing: 1px;
  }

  /* 移动端响应式 */
  @media (max-width: 768px) {
    .profile-header {
      padding: 12px 12px 16px;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
    }

    .online-status {
      width: 14px;
      height: 14px;
      bottom: 15px;
      right: 4px;
      border-width: 2px;
    }

    .profile-name {
      font-size: calc(var(--font-title-size) + 2px);
      margin-top: 12px;
    }
  }
</style>
