<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Params.title }}{{ else }}{{ .Title }} - {{ .Site.Params.title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="keywords" content="{{ with .Params.tags }}{{ delimit . ", " }}{{ else }}{{ .Site.Params.keywords }}{{ end }}">
  <meta name="revisit-after" content="7 days">
  <meta name="rating" content="general">
  <meta name="author" content="{{ .Site.Params.author }}">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Params.title }}{{ else }}{{ .Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:site_name" content="{{ .Site.Params.title }}">
  <meta property="og:locale" content="{{ .Site.LanguageCode }}">
  {{ with .Params.cover }}
  <meta property="og:image" content="{{ . }}">
  <meta property="og:image:alt" content="{{ $.Title }}">
  {{ end }}

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ .Site.Params.title }}{{ else }}{{ .Title }}{{ end }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:site" content="{{ .Site.Params.author }}">
  {{ with .Params.cover }}
  <meta name="twitter:image" content="{{ . }}">
  <meta name="twitter:image:alt" content="{{ $.Title }}">
  {{ end }}

  <link rel="canonical" href="{{ .Permalink }}">
  <link rel="icon" href="{{ .Site.Params.favicon | default "/favicon.png" }}" type="image/png">
  <link rel="sitemap" type="application/xml" title="Sitemap" href="{{ "sitemap.xml" | relURL }}">

  <style>
    :root {
      --theme-color: {{ .Site.Params.themeColor | default "#2e83d3" }};
    }
  </style>

  <link rel="stylesheet" href="{{ "css/index.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/markdown.css" | relURL }}">

  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/htmx.org@1.9.12/dist/htmx.min.js"></script>

  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    } else {
      document.documentElement.classList.remove('dark')
    }
  </script>

  {{ with .OutputFormats.Get "RSS" }}
  <link rel="alternate" type="application/rss+xml" href="{{ .RelPermalink }}" title="{{ $.Site.Params.title }}">
  {{ end }}

  {{ with .Site.Config.Services.GoogleAnalytics.ID }}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ . }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ . }}');
  </script>
  {{ end }}
</head>
