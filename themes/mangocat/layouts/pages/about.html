{{ define "main" }}
<div class="about-page">
  <div class="about-profile">
    <div class="about-avatar-wrapper">
      <img src="{{ with .Site.Params.profile.avatar }}{{ . }}{{ else }}{{ .Site.Params.avatar | default "/avatar.jpg" }}{{ end }}" alt="{{ .Site.Params.author }}" class="about-avatar">
    </div>
    <h1 class="about-name">{{ .Site.Params.author }}</h1>
    <p class="about-tagline">{{ .Site.Params.subtitle | default .Site.Params.description }}</p>
  </div>

  <div class="about-content">
    {{ with .Content }}
      <div class="about-description markdown-body">
        {{ . }}
      </div>
    {{ else }}
      <div class="about-description">
        <p>你好，欢迎来到我的博客！</p>
        <p>这里是我记录生活、分享技术心得的地方。希望这些内容能给你带来一些启发和帮助。</p>
      </div>
    {{ end }}
  </div>

  <div class="about-social">
    <h2 class="social-title">联系方式</h2>
    <div class="social-links">
      {{ range .Site.Params.socialLinks }}
        <a href="{{ .url }}" class="social-link" target="_blank" rel="noopener noreferrer">
          <i class="ri-{{ .icon }}-line"></i>
          <span>{{ .name }}</span>
        </a>
      {{ end }}
    </div>
  </div>
</div>

<style>
.about-page {
  max-width: var(--width);
  margin: 0 auto;
  padding: 0 20px 4rem;
}

.about-profile {
  text-align: center;
  padding: 16px 20px 24px;
}

.about-avatar-wrapper {
  display: inline-block;
  position: relative;
}

.about-avatar {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid var(--border-color);
  box-shadow: 0 4px 20px var(--shadow-color);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.about-avatar:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 30px var(--shadow-color);
}

.about-name {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--title-color);
  margin: 20px 0 8px;
  letter-spacing: 2px;
}

.about-tagline {
  font-size: 1rem;
  color: var(--desc-color);
  margin: 0;
  letter-spacing: 1px;
}

.about-content {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 2rem;
  margin-bottom: 2rem;
  box-shadow: 0 2px 8px var(--shadow-color);
}

.about-description {
  color: var(--text-color);
  line-height: 1.8;
  font-size: 1rem;
}

.about-description p {
  margin-bottom: 1rem;
}

.about-description p:last-child {
  margin-bottom: 0;
}

.about-social {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 2rem;
  box-shadow: 0 2px 8px var(--shadow-color);
}

.social-title {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--title-color);
  margin: 0 0 1.25rem;
  text-align: center;
}

.social-links {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
}

.social-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: var(--info-bg-color);
  border-radius: 25px;
  text-decoration: none;
  color: var(--text-color);
  font-size: 0.9rem;
  transition: all 0.3s ease;
}

.social-link:hover {
  background: var(--theme-color);
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 4px 12px var(--shadow-color);
}

.social-link i {
  font-size: 1.1rem;
}

@media (max-width: 768px) {
  .about-page {
    padding: 0 15px 3rem;
  }

  .about-avatar {
    width: 100px;
    height: 100px;
  }

  .about-name {
    font-size: 1.5rem;
  }

  .about-content,
  .about-social {
    padding: 1.5rem;
  }

  .social-links {
    gap: 10px;
  }

  .social-link {
    padding: 8px 16px;
    font-size: 0.85rem;
  }
}
</style>
{{ end }}
