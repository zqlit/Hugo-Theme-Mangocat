<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" prefix="og: http://ogp.me/ns#">
{{ partial "head.html" . }}

<body>
  <article class="w-full px-2 mx-auto max-w-[1200px]" id="main-container">
    {{ partial "header.html" . }}
    
    <div class="mt-8 mb-16 animate-fade-in-up">
      <div class="flex items-center gap-4 mb-10 ml-2">
        <h1 class="text-3xl font-bold text-neutral-900 tracking-tight dark:text-white">{{ .Title }}</h1>
        <span class="px-3 py-1 bg-black/5 rounded-full text-xs font-bold text-neutral-500 uppercase tracking-widest backdrop-blur-sm dark:bg-white/10 dark:text-neutral-400">
          {{ len .Data.Terms }} Topics
        </span>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {{ range .Data.Terms }}
        <a href="{{ .Page.RelPermalink }}" class="group block p-8 bg-white border-none rounded-3xl shadow-sm shadow-slate-200/50 hover:shadow-xl hover:shadow-slate-200/50 hover:-translate-y-2 transition-all duration-500 relative overflow-hidden hover:bg-white dark:bg-neutral-900/60 dark:border-white/5 dark:hover:bg-neutral-900/80 dark:shadow-black/50 dark:shadow-sm">
            <div class="flex items-center justify-between mb-6">
              <span class="text-xs font-bold text-neutral-400 tracking-widest uppercase group-hover:text-neutral-600 transition-colors dark:text-neutral-500 dark:group-hover:text-neutral-300">
                Topic
              </span>
              <span class="px-3 py-1 bg-neutral-100/80 rounded-full text-[10px] font-bold text-neutral-500 uppercase tracking-wider backdrop-blur-sm group-hover:bg-black/5 transition-colors dark:bg-neutral-800/80 dark:text-neutral-400 dark:group-hover:bg-white/10">
                {{ .Count }} Posts
              </span>
            </div>
            
            <h3 class="text-2xl font-bold text-neutral-900 mb-2 leading-tight group-hover:text-black transition-colors dark:text-white dark:group-hover:text-neutral-100">{{ .Page.Title }}</h3>
            
            <div class="flex items-center gap-2 mt-auto pt-6 border-t border-neutral-100/50 group-hover:border-neutral-200/50 transition-colors dark:border-neutral-700/50 dark:group-hover:border-neutral-600/50">
               <span class="text-xs font-medium text-neutral-400 group-hover:text-black transition-colors flex items-center gap-1 dark:text-neutral-500 dark:group-hover:text-white">
                 View Posts
                 <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-3 h-3 transform group-hover:translate-x-1 transition-transform">
                   <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                 </svg>
               </span>
            </div>
            
            <!-- Decorative gradient blob on hover -->
            <div class="absolute -bottom-20 -right-20 w-40 h-40 bg-gradient-to-br from-neutral-100 to-neutral-200 rounded-full blur-3xl opacity-0 group-hover:opacity-60 transition-opacity duration-500 pointer-events-none dark:from-neutral-800 dark:to-neutral-700"></div>
        </a>
        {{ end }}
      </div>

    </div>

    {{ partial "footer.html" . }}
  </article>

  {{ partial "scripts.html" . }}
</body>

</html>
