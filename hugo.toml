baseURL = "https://usj.cc/"
languageCode = "zh-CN"
title = "USJ Blog"
theme = "mangocat"
DefaultContentLanguage = "cn"
uglyURLs = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    guessSyntax = true
    noClasses = true
    style = "bw"
    tabWidth = 2

[author]
  name = "小赵"
  homepage = "https://usj.cc/"

[params]
# ----- SiteConfig -----
subtitle = "技术分享与生活感悟"
description = "个人技术博客，分享前端开发、网站设计等相关内容"
headTitle = "小赵"
author = "小赵"
favicon = "/favicon.png"
siteUrl = "https://usj.cc"
createTime = "2024-01-23"
keywords = "blog, technology, programming, frontend, web design"
timezone = "Asia/Shanghai"
mainSections = ["posts"]

# Pagination
postsPerPage = 8

# Cover
coverEnable = true

# Site style
themeColor = "#1890ff"
fontFamily = "Inter, sans-serif"
borderRadius = "12px"
darkMode = true

extraCSSFiles = []

# ----- ProfileConfig -----
[params.profile]
name = "USJ"
avatar = "https://usj.cc/image/avatar/tx7.jpg"
desc = "技术分享与生活感悟"

# ----- CommentConfig -----
[params.comment]
enable = true
provider = "artalk"
  [params.comment.artalk]
  server = "https://artalk.usj.cc"
  site = "mangocat"
  akismetKey = ""

# ----- Developer -----
[params.developer]
themeVersion = "5.0.0"

# ----- Categories (icon + color) -----
[params.categories]
  [params.categories."技术"]
  icon = "tabler:braces"
  color = "#2d7be0ff"
  [params.categories."生活"]
  icon = "tabler:edit"
  color = "#b83f81ff"
  [params.categories."随笔"]
  icon = "tabler:pencil"
  color = "#1cb17dff"

# ----- NavConfig -----
[[params.menu]]
name = "归档"
url = "/archives.html"
identifier = "archive"
icon = "tabler:archive"
[[params.menu]]
name = "友链"
url = "/link.html"
identifier = "link"
icon = "tabler:link"
[[params.menu]]
name = "鱼塘"
url = "/circle.html"
identifier = "circle"
icon = "tabler:bubble-text"
[[params.menu]]
name = "项目"
url = "/project.html"
identifier = "project"
icon = "tabler:layout-kanban"
[[params.menu]]
name = "关于"
url = "/about.html"
identifier = "about"
icon = "tabler:user"

# ----- Social links -----
[[params.socialLinks]]
name = "GitHub"
url = "https://github.com"
icon = "github"
[[params.socialLinks]]
name = "Twitter"
url = "https://twitter.com"
icon = "twitter"
[[params.socialLinks]]
name = "Email"
url = "mailto:example@example.com"
icon = "email"
